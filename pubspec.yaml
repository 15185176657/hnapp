name: hnapp
description: "A new Flutter project."
# 防止该私有项目被误发布到 pub.dev。
publish_to: 'none' # 如果未来要发布到 pub.dev，可移除此行。

# 应用版本号与构建号。可在 flutter build 时通过 --build-name 和 --build-number 覆盖。
# Android 中 build-name 对应 versionName，build-number 对应 versionCode。
# iOS 中 build-name 对应 CFBundleShortVersionString，build-number 对应 CFBundleVersion。
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# 运行时依赖。
dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  dio: ^5.7.0

  # 国际化辅助库，用于语言环境相关的数字、日期格式化。
  intl: ^0.20.2

  # 轻量键值存储，用于保存用户选择的语言偏好。
  shared_preferences: ^2.3.2

  # 图表库，用于柱状图、折线图等数据可视化。
  fl_chart: ^1.2.0

  # Cupertino 图标字体，用于 iOS 风格图标。
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Flutter 推荐 lint 规则，具体启用项见根目录 analysis_options.yaml。
  flutter_lints: ^6.0.0

# Flutter 专用配置。
flutter:

  # 启用 Material Icons 字体。
  uses-material-design: true

  # 如需添加资源文件，可启用 assets 配置，例如：
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # 图片资源可配置不同分辨率变体，参考：
  # https://flutter.dev/to/resolution-aware-images

  # 如需引用依赖包中的资源，参考：
  # https://flutter.dev/to/asset-from-package

  # 如需添加自定义字体，可在此处配置 fonts，例如：
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # 如需引用依赖包中的字体，参考：
  # https://flutter.dev/to/font-from-package
